<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santuário Narukami - Recuperação</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="miko-card">
        <div class="emblem">
            <img src="https://api.iconify.design/game-icons:fox-head.svg?color=%23d33389" alt="Yae Fox" width="60">
        </div>
        <h2>Perdeu a memória, gracinha?</h2>
        <p>Até os mais sábios se perdem. Digite seu e-mail e as raposas mensageiras cuidarão do resto.</p>
        
        <form id="recoveryForm">
            <div class="input-group">
                <input type="email" id="email" placeholder="Seu e-mail de devoto" required>
            </div>
            <button type="submit" class="btn-miko">Pedir Benção (Resetar)</button>
        </form>

        <div id="statusMessage" class="hidden">
            <p>As raposas partiram! Verifique sua caixa de entrada em breve.</p>
        </div>

        <div class="footer-links">
            <a href="login.html">Voltar para a Editora Yae</a>
        </div>
    </div>

    <script>
        document.getElementById('recoveryForm').addEventListener('submit', function(e) {
            e.preventDefault();
            this.style.display = 'none';
            document.getElementById('statusMessage').classList.remove('hidden');
        });
    </script>
</body>
</html>
<form action="https://formspree.io/f/mykdqvvq" method="POST">
    <input type="email" name="email" placeholder="Seu e-mail" required>
    <button type="submit">Recuperar Senha</button>
</form>
